# Table of contents
# Docs: https://jupyterbook.org/customize/toc.html
# Framed as a glaciology course. The diagnostic problem (velocity for a given
# geometry) comes first, with all the material it needs; mass balance, firn,
# and climate are held for the prognostic problem (evolution in time).
#
# Labs are distributed: each sits with the chapter it illustrates, diagnostic
# first then prognostic. Lines marked "# lab:" are placeholders for notebooks
# to be written in a later pass and run in the icepack Docker image.

format: jb-book
root: intro
parts:
  - caption: Mathematical and chemical background
    chapters:
      - file: sections/math/chemistry-primer
      - file: sections/math/tensor-algebra
      - file: sections/math/finite-elements
  - caption: The physics of ice
    chapters:
      - file: sections/foundations/water-molecule
      - file: sections/foundations/ice-structure
      - file: sections/foundations/lattice-dynamics
      - file: sections/foundations/point-defects
      - file: sections/foundations/optical-properties
  - caption: Ice deformation and flow
    chapters:
      - file: sections/ice_flow/stress-and-strain
      - file: sections/ice_flow/ice-rheology
      # lab (diagnostic, numpy): Glen's law and the creep curve
      - file: sections/ice_flow/ice-fabric
      # lab (diagnostic, specfab): fabric evolution and directional enhancement
      - file: sections/ice_flow/stress-balance
      - file: sections/ice_flow/shallow-ice
      # lab (diagnostic, numpy): the Vialov and perfect-plastic profiles
      - file: sections/ice_flow/flow-approximations
  - caption: The bed and basal processes
    chapters:
      - file: sections/thermomechanics/thermal-structure
      # lab (diagnostic, numpy): the temperature profile and basal thermal state
      - file: sections/thermomechanics/basal-motion
      # lab (diagnostic, numpy): hard-bed, Budd, regularized-Coulomb and till friction laws
      - file: sections/thermomechanics/hydrology
      # lab (diagnostic, numpy): channels vs cavities, effective pressure vs discharge
  - caption: Observing ice
    chapters:
      - file: sections/observing/elevation
      - file: sections/observing/laser-altimetry
      # lab (numpy): ICESat-2 along-track height to elevation change
      - file: sections/observing/radar-altimetry
      # lab (numpy): waveform retracking and basin elevation change
      - file: sections/observing/panchromatic-imagery
      # lab (numpy): image cross-correlation for displacement; DEM differencing
      - file: sections/observing/insar
      # lab (numpy): form and unwrap an interferogram, phase to velocity
      - file: sections/radar/em-waves
      # lab (numpy): the dielectric spectrum and radar wave speed
      - file: sections/radar/apres
      - file: sections/radar/apres-lab
      - file: sections/radar/radiowave-fabric
      - file: sections/observing/cryoseismicity
      # lab (numpy): STA/LTA detection and location of icequakes
      - file: sections/observing/magnetotellurics
      # lab (numpy): apparent resistivity and phase from E and B time series
      - file: sections/observing/gravity
      # lab (numpy): GRACE mascon time series, trend versus seasonal cycle
  - caption: Computing with icepack
    chapters:
      - file: sections/modeling/labs-intro
      - file: sections/modeling/icepack-intro
      - file: sections/modeling/running-icepack-docker
      - file: sections/modeling/icepack-ice-shelf
      # diagnostic lab above: floating ice-shelf velocity
  - caption: Mass balance and climate
    chapters:
      - file: sections/ice_flow/mass-balance
      # lab (prognostic, icepack): SIA evolution toward the Vialov steady state
      - file: sections/climate/glacier-variations
      # lab (prognostic, numpy): 1-stage vs 3-stage response; committed retreat; red-noise length wandering
      - file: sections/foundations/snow-to-ice
      - file: sections/climate/paleoclimate
      # lab (prognostic, numpy): ice-core layer thinning and Milankovitch forcing
      # lab (prognostic, icepack): glacial-cycle ice-sheet evolution
  - caption: The wider cryosphere
    chapters:
      - file: sections/cryosphere/ice-sheets
      # lab (prognostic, numpy): Robel two-stage marine glacier; grounding line on an overdeepened bed
      - file: sections/cryosphere/instabilities
      - file: sections/cryosphere/sea-ice
      # lab (diagnostic, numpy): brine volume and effective thermal properties vs temperature
      - file: sections/cryosphere/erosion
      - file: sections/cryosphere/former-glaciers
      - file: sections/cryosphere/permafrost
      # lab (diagnostic, numpy): trumpet diagram and borehole paleothermometry
  - caption: References
    chapters:
      - file: references
