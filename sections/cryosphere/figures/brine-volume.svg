<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ax5" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#333"/>
    </marker>
  </defs>

  <!-- axes: x = temperature -20..0 C maps 80..660; y = brine volume 0..25% maps 340..60 -->
  <line x1="80" y1="340" x2="690" y2="340" stroke="#333" stroke-width="2" marker-end="url(#ax5)"/>
  <line x1="80" y1="340" x2="80" y2="40" stroke="#333" stroke-width="2" marker-end="url(#ax5)"/>

  <g stroke="#333" stroke-width="1.5">
    <line x1="80" y1="340" x2="80" y2="347"/>
    <line x1="225" y1="340" x2="225" y2="347"/>
    <line x1="370" y1="340" x2="370" y2="347"/>
    <line x1="515" y1="340" x2="515" y2="347"/>
    <line x1="660" y1="340" x2="660" y2="347"/>
    <line x1="73" y1="228" x2="80" y2="228"/>
    <line x1="73" y1="116" x2="80" y2="116"/>
  </g>
  <g fill="#333" font-size="15" text-anchor="middle">
    <text x="80" y="365">&#8722;20</text>
    <text x="225" y="365">&#8722;15</text>
    <text x="370" y="365">&#8722;10</text>
    <text x="515" y="365">&#8722;5</text>
    <text x="660" y="365">0</text>
    <text x="385" y="398">ice temperature  T&#7522;  (&#176;C)</text>
  </g>
  <g fill="#333" font-size="15" text-anchor="end">
    <text x="68" y="345">0</text>
    <text x="68" y="233">10</text>
    <text x="68" y="121">20</text>
  </g>
  <text x="28" y="195" fill="#333" font-size="15" transform="rotate(-90 28 195)" text-anchor="middle">brine volume fraction  &#957;&#8345;  (%)</text>

  <!-- nu_b ~ -m rho_i S_i/(rho_b T): with m rho_i/rho_b ~ 0.0532 (Frankenstein-Garner style nu_b = S_i(0.0532 - 4.919/T) ... use nu_b(%) ~ S_i * (49.185/|T| + 0.532)/10 -->
  <!-- S=10 ppt (first-year): T=-20: nu=2.96%, -15: 3.81, -10: 5.45, -7.5: 7.09, -5: 10.37, -4: 12.8, -3: 16.9, -2.5: 20.2, -2: 25.1 -->
  <!-- mapping: x = 660 + 29*T (T negative), y = 340 - 11.2*nu -->
  <path d="M80,306.8 L225,297.3 L370,279.0 L442.5,260.6 L515,223.9 L544,196.6 L573,150.7 L587.5,113.8 L602,58.9"
        fill="none" stroke="#2166ac" stroke-width="3.5"/>
  <text x="430" y="200" fill="#2166ac" font-size="15">first-year ice, S&#7522; = 10 &#8240;</text>

  <!-- S=5 ppt (multiyear): nu = half of above: -20:1.48, -15:1.91, -10:2.73, -7.5:3.54, -5:5.19, -4:6.4, -3:8.45, -2.5:10.1, -2:12.55, -1.5:16.6, -1.2:20.6 -->
  <path d="M80,323.4 L225,318.6 L370,309.4 L442.5,300.3 L515,281.9 L544,268.3 L573,245.4 L587.5,226.9 L602,199.4 L616.5,154.1 L625.2,109.3"
        fill="none" stroke="#5b9bc0" stroke-width="3.5" stroke-dasharray="8,5"/>
  <text x="490" y="310" fill="#5b9bc0" font-size="15">multiyear ice, S&#7522; = 5 &#8240;</text>

  <!-- mechanical integrity threshold -->
  <line x1="80" y1="60" x2="660" y2="60" stroke="#b2182b" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="90" y="52" fill="#b2182b" font-size="14">engineering strength &#8594; 0 near &#957;&#8345; &#8776; 30% (off scale)</text>
</svg>
