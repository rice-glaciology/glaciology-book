# Table of contents
# Docs: https://jupyterbook.org/customize/toc.html
# Architecture (June 2026): icepack introduced up front so models run from
# day one; diagnostic labs distributed through the early parts, prognostic
# labs in the later parts. Mass balance and climate precede observing, and
# observing is framed around the products ice-flow models consume and the
# observations we would like to use more. Lines marked "# lab:" are
# placeholders for notebooks still to be written.

