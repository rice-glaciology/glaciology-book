<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="axg" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#333"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="80" y1="340" x2="700" y2="340" stroke="#333" stroke-width="2" marker-end="url(#axg)"/>
  <line x1="80" y1="340" x2="80" y2="40" stroke="#333" stroke-width="2" marker-end="url(#axg)"/>
  <text x="400" y="385" fill="#333" font-size="15" text-anchor="middle">deviatoric stress  &#964;  (normalized)</text>
  <text x="35" y="190" fill="#333" font-size="15" transform="rotate(-90 35 190)" text-anchor="middle">strain rate  &#949;&#775;  (normalized)</text>

  <!-- tick at tau = 1 -->
  <line x1="580" y1="340" x2="580" y2="347" stroke="#333" stroke-width="1.5"/>
  <text x="580" y="365" fill="#333" font-size="14" text-anchor="middle">&#964; = &#964;&#8344;</text>

  <!-- n = 1 Newtonian line -->
  <line x1="80" y1="340" x2="680" y2="60" stroke="#92c5de" stroke-width="3"/>
  <text x="395" y="170" fill="#5b9bc0" font-size="15" transform="rotate(-25 395 170)">n = 1  (Newtonian)</text>

  <!-- n = 3 Glen curve -->
  <path d="M80,340 L180,338.1 L280,325.1 L380,289.7 L430,262.5 L480,220.7 L530,170.5 L580,107 L605,70"
        fill="none" stroke="#2166ac" stroke-width="3.5" stroke-linecap="round"/>
  <text x="455" y="255" fill="#2166ac" font-size="15">n = 3  (Glen)</text>

  <!-- perfectly plastic -->
  <path d="M80,340 L578,340 L578,70" fill="none" stroke="#b2182b" stroke-width="2.5" stroke-dasharray="7,5"/>
  <text x="590" y="200" fill="#b2182b" font-size="15">n &#8594; &#8734;  (perfectly plastic)</text>

  <!-- annotation: glacier stress range -->
  <rect x="105" y="60" width="125" height="280" fill="#f0e6c8" opacity="0.5"/>
  <text x="167" y="52" fill="#8a7350" font-size="13" text-anchor="middle">typical glacier stresses</text>
</svg>
